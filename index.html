document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

280\">EN<\u002Fspan><\u002Fsc-if>\n      <\u002Fbutton>\n      <span style=\"color:#3a4048\">/<\u002Fspan>\n      <button onclick=\"{{ setFr }}\" style=\"background:none;border:none;cursor:pointer;padding:4px 2px;letter-spacing:.18em;font-family:inherit;font-size:12px;transition:color .25s\">\n        <sc-if value=\"{{ isFr }}\"><span style=\"color:var(--accent,#35d6e0)\">FR<\u002Fspan><\u002Fsc-if>\n        <sc-if value=\"{{ notFr }}\"><span style=\"color:#6b7280\">FR<\u002Fspan><\u002Fsc-if>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- Hero -->\n  <main style=\"position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px clamp(24px,6vw,72px)\">\n    <div style=\"max-width:1000px;display:flex;flex-direction:column;align-items:center\">\n\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:clamp(22px,4vh,38px)\">\n        <span style=\"width:5px;height:5px;border-radius:50%;background:var(--accent,#35d6e0);animation:amGlow 2.6s ease-in-out infinite\"><\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted,#737f8a)\">{{ kicker }}<\u002Fspan>\n      <\u002Fdiv>\n\n      <h1 style=\"font-family:var(--display,Sora),Sora,ui-sans-serif,sans-serif;font-weight:var(--dw,600);font-size:var(--tsize,clamp(40px,8.2vw,112px));line-height:var(--dlh,.98);letter-spacing:var(--ds,-.02em);text-transform:var(--dt,none);color:var(--fg,#eef3f5);margin-bottom:clamp(20px,3.4vh,30px);text-wrap:balance\">{{ tagline }}<\u002Fh1>\n\n      <p style=\"max-width:560px;font-size:clamp(15px,1.6vw,18px);line-height:1.6;color:var(--muted,#737f8a);margin-bottom:clamp(34px,5vh,46px);text-wrap:pretty\">{{ subline }}<\u002Fp>\n\n      <div style=\"width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:14px\">\n        <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ onSubmit }}\" style=\"width:100%\">\n            <div style=\"display:flex;align-items:center;gap:8px;padding:7px 7px 7px 20px;border-radius:100px;background:rgba(255,255,255,.035);border:1px solid rgba(var(--accent-rgb,53,214,224),.22);backdrop-filter:blur(8px)\">\n              <input value=\"{{ email }}\" oninput=\"{{ onEmail }}\" type=\"email\" placeholder=\"{{ emailPlaceholder }}\" style=\"flex:1;min-width:0;background:none;border:none;outline:none;color:var(--fg,#eef3f5);font-family:Sora,sans-serif;font-size:15px;letter-spacing:.01em\">\n              <button type=\"submit\" style=\"flex-shrink:0;border:none;cursor:pointer;border-radius:100px;padding:13px 24px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#06080a;background:var(--accent,#35d6e0);box-shadow:0 0 28px rgba(var(--accent-rgb,53,214,224),.4);transition:transform .2s,box-shadow .25s\" style-hover=\"transform:translateY(-1px);box-shadow:0 0 40px rgba(var(--accent-rgb,53,214,224),.6)\">{{ cta }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fform>\n          <sc-if value=\"{{ error }}\"><span style=\"font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.08em;color:#ff7a6b\">{{ errorMsg }}<\u002Fspan><\u002Fsc-if>\n          <sc-if value=\"{{ notError }}\"><span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#52596311;color:#525963\">{{ note }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ submitted }}\">\n          <div style=\"width:100%;display:flex;flex-direction:column;align-items:center;gap:12px;padding:26px 20px;border-radius:18px;background:rgba(var(--accent-rgb,53,214,224),.06);border:1px solid rgba(var(--accent-rgb,53,214,224),.22)\">\n            <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--accent,#35d6e0);box-shadow:0 0 14px rgba(var(--accent-rgb,53,214,224),.9)\"><\u002Fspan><span style=\"font-family:var(--display,Sora),Sora,sans-serif;font-weight:500;font-size:20px;letter-spacing:.01em;color:var(--fg,#eef3f5)\">{{ success }}<\u002Fspan><\u002Fdiv>\n            <span style=\"font-size:13.5px;line-height:1.5;color:var(--muted,#737f8a);max-width:320px\">{{ successNote }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- Bottom bar -->\n  <footer style=\"position:absolute;bottom:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:26px clamp(24px,5vw,64px);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em\">\n    <div style=\"display:flex;align-items:center;gap:9px;color:var(--muted,#737f8a);text-transform:uppercase\">\n      <span style=\"width:5px;height:5px;border-radius:50%;background:var(--accent,#35d6e0);animation:amBlink 2.4s steps(1) infinite\"><\u002Fspan>{{ status }}\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showSwitcher }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;align-items:center;gap:4px;padding:5px;border-radius:100px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)\">\n        <button onclick=\"{{ setA }}\" style=\"cursor:pointer;border:none;background:none;border-radius:100px;padding:6px 13px;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;transition:all .25s\">\n          <sc-if value=\"{{ isA }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#06080a;background:#35d6e0;margin:-6px -13px;padding:6px 13px;border-radius:100px;box-shadow:0 0 18px rgba(53,214,224,.5)\">Pulse<\u002Fspan><\u002Fsc-if>\n          <sc-if value=\"{{ notA }}\"><span style=\"color:#6b7280\">Pulse<\u002Fspan><\u002Fsc-if>\n        <\u002Fbutton>\n        <button onclick=\"{{ setB }}\" style=\"cursor:pointer;border:none;background:none;border-radius:100px;padding:6px 13px;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;transition:all .25s\">\n          <sc-if value=\"{{ isB }}\"><span style=\"color:#06080a;background:#e9edf2;margin:-6px -13px;padding:6px 13px;border-radius:100px;box-shadow:0 0 18px rgba(233,237,242,.45)\">Noir<\u002Fspan><\u002Fsc-if>\n          <sc-if value=\"{{ notB }}\"><span style=\"color:#6b7280\">Noir<\u002Fspan><\u002Fsc-if>\n        <\u002Fbutton>\n        <button onclick=\"{{ setC }}\" style=\"cursor:pointer;border:none;background:none;border-radius:100px;padding:6px 13px;font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;transition:all .25s\">\n          <sc-if value=\"{{ isC }}\"><span style=\"color:#06080a;background:#aebfd0;margin:-6px -13px;padding:6px 13px;border-radius:100px;box-shadow:0 0 18px rgba(174,191,208,.45)\">Graphite<\u002Fspan><\u002Fsc-if>\n          <sc-if value=\"{{ notC }}\"><span style=\"color:#6b7280\">Graphite<\u002Fspan><\u002Fsc-if>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:flex;align-items:center;gap:18px;color:var(--muted,#737f8a);text-transform:uppercase\">\n      <a href=\"#\" style=\"color:inherit;text-decoration:none;transition:color .25s\" style-hover=\"color:var(--accent,#35d6e0)\">Instagram<\u002Fa>\n      <a href=\"#\" style=\"color:inherit;text-decoration:none;transition:color .25s\" style-hover=\"color:var(--accent,#35d6e0)\">X<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot; },\n  &quot;direction&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;A&quot;, &quot;B&quot;, &quot;C&quot;], &quot;default&quot;: &quot;A&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Setup&quot; },\n  &quot;language&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;auto&quot;, &quot;en&quot;, &quot;fr&quot;], &quot;default&quot;: &quot;auto&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Setup&quot; },\n  &quot;showThemeSwitcher&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Setup&quot; }\n}\">\nclass Component extends DCLogic {\n  themes = {\n    // Pulse — unchanged\n    A: { mode: 'net', rgb: [53,214,224], net: { density: 1, dotA: 0.55, lineA: 0.20, reach: 116, speed: 1, dotR: 1.4 }, vars: {\n      '--bg':'#07080b','--accent':'#35d6e0','--accent-rgb':'53,214,224','--fg':'#eef3f5','--muted':'#737f8a',\n      '--display':'Sora','--dw':'600','--ds':'-0.02em','--dt':'none','--tsize':'clamp(40px,8.2vw,112px)','--dlh':'0.98' } },\n    // Noir — pure black, silver/white, Apple keynote restraint\n    B: { mode: 'net', rgb: [244,247,251], net: { density: 1, dotA: 0.85, lineA: 0.28, reach: 130, speed: 0.85, dotR: 1.5, glow: 7 }, vars: {\n      '--bg':'#000000','--accent':'#e9edf2','--accent-rgb':'233,237,242','--fg':'#f3f5f8','--muted':'#6e747c',\n      '--display':'Sora','--dw':'600','--ds':'-0.035em','--dt':'none','--tsize':'clamp(44px,9vw,128px)','--dlh':'0.96' } },\n    // Graphite — pure black, icy steel-blue, deep and quiet\n    C: { mode: 'net', rgb: [168,193,217], net: { density: 0.95, dotA: 0.8, lineA: 0.24, reach: 132, speed: 0.7, dotR: 1.5, glow: 7 }, vars: {\n      '--bg':'#000000','--accent':'#aebfd0','--accent-rgb':'174,191,208','--fg':'#eef1f4','--muted':'#6a7079',\n      '--display':'Sora','--dw':'400','--ds':'-0.02em','--dt':'none','--tsize':'clamp(42px,8.6vw,118px)','--dlh':'1.0' } },\n  };\n\n  state = { theme: 'A', lang: 'en', email: '', submitted: false, error: false };\n\n  bindRoot = (el) => { this.root = el; };\n  bindCanvas = (el) => { this.canvas = el; };\n\n  componentDidMount() {\n    const dir = ['A','B','C'].includes(this.props.direction) ? this.props.direction : 'A';\n    let lang = this.props.language;\n    if (!lang || lang === 'auto') {\n      lang = ((navigator.language || 'en').toLowerCase().startsWith('fr')) ? 'fr' : 'en';\n    }\n    this.setState({ theme: dir, lang });\n    this.mode = this.themes[dir].mode;\n    this.rgb = this.themes[dir].rgb;\n    this.applyTheme(dir);\n    this.initCanvas();\n  }\n\n  componentDidUpdate(prev) {\n    this.applyTheme(this.state.theme);\n    if (prev && prev.direction !== this.props.direction && ['A','B','C'].includes(this.props.direction) && this.props.direction !== this.state.theme) {\n      this.setState({ theme: this.props.direction });\n    }\n  }\n\n  componentWillUnmount() { if (this._raf) cancelAnimationFrame(this._raf); }\n\n  applyTheme(theme) {\n    const th = this.themes[theme]; if (!th) return;\n    this.mode = th.mode; this.rgb = th.rgb; this.netCfg = th.net || null;\n    const el = this.root; if (!el) return;\n    Object.entries(th.vars).forEach(([k,v]) => el.style.setProperty(k, v));\n  }\n\n  initCanvas() {\n    const cv = this.canvas; if (!cv) return;\n    const ctx = cv.getContext('2d');\n    let w = 0, h = 0, dots = [], blobs = [], scan = 0;\n    const init = () => {\n      const n = Math.round(Math.min(120, Math.max(40, w*h/13000)));\n      dots = Array.from({length:n}, () => ({ x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-.5)*.28, vy:(Math.random()-.5)*.28 }));\n      blobs = Array.from({length:5}, (_,i) => ({ x:Math.random()*w, y:Math.random()*h, r:Math.max(w,h)*(.26+Math.random()*.2), a:Math.random()*6.28, sp:.003+Math.random()*.004, k:i }));\n    };\n    const resize = () => {\n      const dpr = Math.min(window.devicePixelRatio||1, 2);\n      w = cv.clientWidth; h = cv.clientHeight;\n      cv.width = w*dpr; cv.height = h*dpr;\n      ctx.setTransform(dpr,0,0,dpr,0,0);\n      init();\n    };\n    const wrap = (d) => { if(d.x<-20)d.x+=w+40; if(d.x>w+20)d.x-=w+40; if(d.y<-20)d.y+=h+40; if(d.y>h+20)d.y-=h+40; };\n    const palette = [[155,124,248],[88,116,255],[60,170,224]];\n    const frame = () => {\n      const mode = this.mode || 'net';\n      const c = this.rgb || [53,214,224];\n      ctx.clearRect(0,0,w,h);\n      if (mode === 'aurora') {\n        ctx.globalCompositeOperation = 'lighter';\n        blobs.forEach((bl,i) => {\n          bl.a += bl.sp;\n          const cx = bl.x + Math.cos(bl.a)*w*.13;\n          const cy = bl.y + Math.sin(bl.a*1.1)*h*.13;\n          const col = palette[i % palette.length];\n          const g = ctx.createRadialGradient(cx,cy,0,cx,cy,bl.r);\n          g.addColorStop(0, `rgba(${col[0]},${col[1]},${col[2]},0.15)`);\n          g.addColorStop(1, 'rgba(0,0,0,0)');\n          ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx,cy,bl.r,0,6.29); ctx.fill();\n        });\n        ctx.globalCompositeOperation = 'source-over';\n      } else if (mode === 'atelier') {\n        ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.45)`;\n        dots.slice(0,34).forEach(d => { d.x+=d.vx*.32; d.y+=d.vy*.32; wrap(d); ctx.fillRect(d.x,d.y,1.2,1.2); });\n        scan = (scan + 0.45) % (h + 160) ;\n        const sy = scan - 80;\n        const g = ctx.createLinearGradient(0, sy-70, 0, sy+70);\n        g.addColorStop(0,'rgba(0,0,0,0)');\n        g.addColorStop(.5,`rgba(${c[0]},${c[1]},${c[2]},0.05)`);\n        g.addColorStop(1,'rgba(0,0,0,0)');\n        ctx.fillStyle = g; ctx.fillRect(0, sy-70, w, 140);\n      } else {\n        const cfg = this.netCfg || { density:1, dotA:0.55, lineA:0.20, reach:116, speed:1, dotR:1.4 };\n        const reach = cfg.reach, reach2 = reach*reach, sp = cfg.speed;\n        const n = Math.max(1, Math.round(dots.length * cfg.density));\n        for (let i=0;i<n;i++){ const d=dots[i]; d.x+=d.vx*sp; d.y+=d.vy*sp; wrap(d); }\n        for (let i=0;i<n;i++) {\n          for (let j=i+1;j<n;j++) {\n            const a=dots[i], b=dots[j];\n            const dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy;\n            if (d2 < reach2) {\n              const al = (1 - Math.sqrt(d2)/reach) * cfg.lineA;\n              ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${al})`;\n              ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();\n            }\n          }\n        }\n        ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${cfg.dotA})`;\n        if (cfg.glow) { ctx.shadowBlur = cfg.glow; ctx.shadowColor = `rgba(${c[0]},${c[1]},${c[2]},0.95)`; }\n        for (let i=0;i<n;i++){ const d=dots[i]; ctx.beginPath(); ctx.arc(d.x,d.y,cfg.dotR,0,6.29); ctx.fill(); }\n        ctx.shadowBlur = 0;\n      }\n      this._raf = requestAnimationFrame(frame);\n    };\n    window.addEventListener('resize', resize);\n    this._cleanupResize = () => window.removeEventListener('resize', resize);\n    resize(); frame();\n  }\n\n  dict() {\n    return {\n      en: {\n        kicker: 'Next-generation AI video studio',\n        tagline: 'Create what you want.',\n        subline: 'A new way of creating is coming to life — built by artists, powered by intelligence. Request access to be the first to know.',\n        emailPlaceholder: 'you@email.com',\n        cta: 'Request access',\n        note: 'No spam — one email when the doors open.',\n        errorMsg: 'Please enter a valid email.',\n        success: \"You're on the list.\",\n        successNote: \"We'll reach out before launch. Keep an eye on your inbox.\",\n        status: 'Launching 2026',\n      },\n      fr: {\n        kicker: 'Studio vidéo IA nouvelle génération',\n        tagline: 'Créez ce que vous imaginez.',\n        subline: \"Un nouveau studio vidéo prend forme — imaginé par des artistes, propulsé par l'intelligence. La révélation approche.\",\n        emailPlaceholder: 'vous@email.com',\n        cta: 'Demander un accès',\n        note: \"Pas de spam — un seul e-mail à l'ouverture.\",\n        errorMsg: 'Veuillez saisir un e-mail valide.',\n        success: 'Vous êtes sur la liste.',\n        successNote: 'Nous vous écrirons avant le lancement. Surveillez votre boîte mail.',\n        status: 'Lancement 2026',\n      },\n    };\n  }\n\n  renderVals() {\n    const { theme, lang, email, submitted, error } = this.state;\n    const D = this.dict()[lang] || this.dict().en;\n    return {\n      ...D,\n      theme, lang, email, submitted, error,\n      notSubmitted: !submitted,\n      notError: !error,\n      isEn: lang === 'en', notEn: lang !== 'en',\n      isFr: lang === 'fr', notFr: lang !== 'fr',\n      isA: theme === 'A', notA: theme !== 'A',\n      isB: theme === 'B', notB: theme !== 'B',\n      isC: theme === 'C', notC: theme !== 'C',\n      showSwitcher: this.props.showThemeSwitcher !== false,\n      bindRoot: this.bindRoot,\n      bindCanvas: this.bindCanvas,\n      onEmail: (e) => this.setState({ email: e.target.value, error: false }),\n      onSubmit: (e) => {\n        e.preventDefault();\n        const ok = /^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(this.state.email.trim());\n        if (!ok) { this.setState({ error: true }); return; }\n        this.setState({ submitted: true });\n      },\n      setEn: () => this.setState({ lang: 'en' }),\n      setFr: () => this.setState({ lang: 'fr' }),\n      setA: () => this.setState({ theme: 'A' }),\n      setB: () => this.setState({ theme: 'B' }),\n      setC: () => this.setState({ theme: 'C' }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
